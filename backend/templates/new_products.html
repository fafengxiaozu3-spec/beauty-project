<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>新增產品｜美妝保母</title>
</head>
<body>
    <h1>新增美妝產品</h1>

    <form method="post">
        <p>
            <label>產品名稱：</label>
            <input type="text" name="product_name" required>
        </p>

        <p>
            <label>品牌：</label>
            <input type="text" name="brand">
        </p>

        <p>
            <label>類別：</label>
            <select name="category">
                <option value="保養">保養</option>
                <option value="底妝">底妝</option>
                <option value="眼妝">眼妝</option>
                <option value="唇彩">唇彩</option>
                <option value="防曬">防曬</option>
                <option value="其他">其他</option>
            </select>
        </p>

        <p>
            <label>開封日期：</label>
            <input type="date" name="open_date" required>
        </p>

        <p>
            <label>開封後保存月數：</label>
            <input type="number" name="expire_months" value="12" required>
        </p>

        <button type="submit">新增</button>
    </form>

    <p>
        <a href="/products">回產品列表</a>
    </p>
</body>
</html>
